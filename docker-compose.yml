version: "3.9"

services:
  api:
    build: .
    container_name: home-credit-api
    ports:
      - "8000:8000"
    environment:
      HOME_CREDIT_API_HOST: "0.0.0.0"
      HOME_CREDIT_API_PORT: "8000"
      HOME_CREDIT_API_WORKERS: "1"
    volumes:
      - ./models:/app/models:ro
      - ./configs:/app/configs:ro

  locust:
    build: .
    container_name: home-credit-locust
    depends_on:
      - api
    command:
      [
        "locust",
        "-f",
        "tests/load/locustfile.py",
        "--host",
        "http://api:8000",
        "--headless",
        "--users",
        "25",
        "--spawn-rate",
        "5",
        "--run-time",
        "2m"
      ]
    volumes:
      - ./examples:/app/examples:ro
